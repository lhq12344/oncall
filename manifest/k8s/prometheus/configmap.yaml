apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: infra
data:
  prometheus.yml: |
    # Prometheus 配置文件
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: 'oncall-k8s'
        environment: 'production'

    # 告警规则文件
    rule_files:
      - '/etc/prometheus/alert_rules.yml'

    # 抓取配置
    scrape_configs:
      # Prometheus 自身监控
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # K8s Pods (自动发现带 prometheus.io/scrape 注解的 Pod)
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name

      # Nacos 监控
      - job_name: 'nacos'
        static_configs:
          - targets: ['nacos.infra.svc:8848']
        metrics_path: '/nacos/actuator/prometheus'
        scrape_interval: 30s

      # MySQL 监控
      - job_name: 'mysql'
        static_configs:
          - targets: ['mysql-svc.infra.svc:3306']
        scrape_interval: 30s

      # Milvus 监控
      - job_name: 'milvus'
        static_configs:
          - targets: ['milvus.infra.svc:9091']
        metrics_path: '/metrics'
        scrape_interval: 30s

  alert_rules.yml: |
    # Prometheus 告警规则
    groups:
      - name: basic_alerts
        rules:
          # 服务下线告警
          - alert: ServiceDown
            expr: up == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "服务 {{ $labels.job }} 已下线"
              description: "服务 {{ $labels.job }} 在 {{ $labels.instance }} 上已下线超过 1 分钟"

          # Pod 重启频繁
          - alert: PodRestartingTooOften
            expr: rate(kube_pod_container_status_restarts_total[15m]) > 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} 频繁重启"
              description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} 在过去 15 分钟内重启了 {{ $value }} 次"

          # 接口失败率过高
          - alert: HighErrorRate
            expr: (rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m])) * 100 > 10
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "{{ $labels.job }} 错误率过高"
              description: "{{ $labels.job }} 错误率超过 10% 持续 2 分钟"

          # Milvus 连接失败
          - alert: MilvusConnectionFailed
            expr: up{job="milvus"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Milvus 连接失败"
              description: "无法连接到 Milvus 服务超过 1 分钟"

          # Nacos 服务异常
          - alert: NacosServiceDown
            expr: up{job="nacos"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Nacos 服务异常"
              description: "Nacos 服务已下线超过 1 分钟"
