# https://goframe.org/docs/web/server-config-file-template
server:
  address: ":8000"
  openapiPath: "/api.json"
  swaggerPath: "/swagger"

# https://goframe.org/docs/core/glog-config
logger:
  level: "all"
  stdout: true

ds_think_chat_model:
  api_key: "sk-ImoWDGMu3iS7V3cpr9C3eOZEOWZsqJ6aTkAMiSAEvgfvOmqM"
  base_url: "http://newapi.200m.997555.xyz/v1"
  model: "claude-opus-4-6"  # Claude Opus 4.6

ds_quick_chat_model:
  api_key: "sk-ImoWDGMu3iS7V3cpr9C3eOZEOWZsqJ6aTkAMiSAEvgfvOmqM"
  base_url: "http://newapi.200m.997555.xyz/v1"
  model: "claude-sonnet-4-6"  # Claude Sonnet 4.6 (更快)

doubao_embedding_model:
  api_key: "c3b9d277-0f82-4ef0-970a-1f3b5607c861"
  base_url: "https://ark.cn-beijing.volces.com/api/v3"
  model: "doubao-embedding-text-240515"  # Doubao Embedding text-240515
  dimensions: 1024  # text-240515 使用 1024 维度

file_dir: "/home/lihaoqian/myproject/go_agent/docs/"
cls_mcp_url: "https://mcp-api.tencent-cloud.com/sse/77977c99c3e6593c"

redis:
  addr: "localhost:30379"
  db: 0
  dialTimeout: 2

# MySQL数据库配置
mysql:
  dsn: "root:123456@tcp(localhost:30306)/orm_test?charset=utf8mb4&parseTime=True&loc=Local&timeout=3s&readTimeout=5s&writeTimeout=5s"
  max_open_conns: 50
  max_idle_conns: 10
  conn_max_lifetime: "30m"
  conn_max_idle_time: "5m"
  ping_timeout: "3s"
  prepare_stmt: true
  log_level: "warn"
  slow_threshold: "500ms"

#web
web_search:
  api_key: "your-bing-search-api-key"
  endpoint: "https://api.bing.microsoft.com/v7.0/search"  # 可选，默认使用Bing搜索API的标准端点

# Prometheus 监控配置
prometheus:
  url: "http://127.0.0.1:30090"    # 集群外访问
  # url: "http://prometheus.infra.svc:9090"  # K8s 集群内访问

# K8s 配置
kubeconfig: "/home/lihaoqian/.kube/config"  # K8s kubeconfig 路径

# Elasticsearch 日志系统配置
elasticsearch:
  addresses:
    - "http://localhost:30920"  # ES 集群地址（集群外访问）
    # - "http://elasticsearch.infra.svc:9200"  # K8s 集群内访问
  username: ""  # 用户名（可选）
  password: ""  # 密码（可选）
  timeout: "10s"  # 请求超时
  tls_skip: true  # 跳过 TLS 验证（开发环境）

# Milvus 向量数据库配置
milvus:
  address: "milvus.infra.svc:19530"        # K8s 集群内访问
  # address: "127.0.0.1:31953"       # 集群外访问
  database: "default"
  collection: "oncall_knowledge"

# 缓存配置
cache:
  llm_ttl: "30m"          # LLM 响应缓存 30 分钟
  vector_ttl: "1h"        # 向量检索缓存 1 小时
  monitoring_ttl: "5m"    # 监控数据缓存 5 分钟

# 并发配置
concurrent:
  max_concurrency: 10     # 最大并发数
  timeout: "30s"          # 超时时间

# 熔断器配置
circuit_breaker:
  failure_threshold: 5    # 连续失败 5 次触发熔断
  failure_ratio: 0.5      # 失败率 50% 触发熔断
  timeout: "60s"          # 熔断 60 秒后尝试恢复
  min_request_count: 10   # 最小请求数（达到此数量才开始统计失败率）