# Prometheus 配置文件
global:
  scrape_interval: 15s # 设置抓取间隔，默认为1分钟
  evaluation_interval: 15s # 设置规则评估间隔，默认为1分钟

# 告警规则文件
rule_files:
  - "alert_rules.yml"

# 抓取配置
scrape_configs:
  # Prometheus 自身的监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # 如果有其他服务需要监控，可以在这里添加
  # 例如监控应用程序指标
  - job_name: 'go_agent'
    static_configs:
      - targets: ['192.168.149.128:6872']  # 你的应用程序地址
    metrics_path: '/metrics'  # 如果应用程序暴露了metrics端点
    scrape_interval: 30s

  # Milvus 监控 (如果Milvus暴露了metrics)
  - job_name: 'milvus'
    static_configs:
      - targets: ['standalone:9091']
    metrics_path: '/metrics'
    scrape_interval: 30s

# 告警管理器配置 (可选)
# alerting:
#   alertmanagers:
